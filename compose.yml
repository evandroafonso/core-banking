version: "3.9"

services:

  postgres:
    image: postgres:17
    container_name: core-banking-database
    restart: unless-stopped

    environment:
      POSTGRES_DB: core_banking_database
      POSTGRES_USER: banking_admin
      POSTGRES_PASSWORD: password

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U banking_admin -d core_banking_database"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4-management
    container_name: core-banking-rabbitmq
    restart: unless-stopped

    environment:
      RABBITMQ_DEFAULT_USER: banking_admin
      RABBITMQ_DEFAULT_PASS: password

    ports:
      - "5672:5672"
      - "15672:15672"

    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  rabbitmq-data: